# GLM-OCR config — self-hosted via Ollama.
# Used by glm_ocr.py. Adjust if Ollama runs elsewhere.

pipeline:
  maas:
    enabled: false          # no cloud API
  layout:
    device: cpu             # 4 GB VRAM machines: keep layout off-GPU
    # Local path to a snapshot of PaddlePaddle/PP-DocLayoutV3_safetensors.
    # This dev environment has no HF access at runtime, so we stage the
    # model files under models/ on a connected machine and copy them over.
    # See SETUP.md → "Stage the layout model" for the fetch command.
    model_dir: models/PP-DocLayoutV3
  ocr_api:
    # User-level Ollama runs on :11435 to coexist with any system Ollama on
    # :11434. See SETUP.md. Override via env (GLMOCR_OCR_API_PORT) if needed.
    api_host: 127.0.0.1
    api_port: 11435
    api_path: /api/generate
    api_mode: ollama_generate
    model: glm-ocr:latest

logging:
  level: INFO
